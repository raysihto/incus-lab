name: Test Docker Buildx

on:
  push:
    branches:
      - test/docker-capabilities

permissions: {}

jobs:
  buildx:
    runs-on: self-hosted
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (native)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: test:native

      - name: Verify native build
        run: docker run --rm test:native
