name: Super-Linter

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: [self-hosted, incus-lab]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: super-linter/super-linter@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: main
