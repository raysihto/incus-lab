name: Test Testcontainers

on:
  push:
    branches:
      - test/docker-capabilities

permissions: {}

jobs:
  testcontainers:
    runs-on: self-hosted
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libssl-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run testcontainers test
        working-directory: testcontainers-check
        run: cargo test -- --nocapture
